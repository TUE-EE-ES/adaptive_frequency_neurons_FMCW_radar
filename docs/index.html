<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive-Frequency Resonate-and-Fire Neurons for Spectral Estimation of Streaming Radar Signals</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signalsmith-js-fft@1.0.0/fft.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Adaptive-Frequency Resonate-and-Fire Neurons for Spectral Estimation of Streaming Radar Signals</h2>
    <p>Adjust the sliders below to change the signal.</p>

    <div class="charts-wrapper">

        <div class="controls">
            <div class="toggle-container">
                <span class="toggle-label">Hanning:</span>
                <label class="switch">
                    <input type="checkbox" id="hannToggle" value="on">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="slider-group">
                <span class="toggle-label">Inverse Lambda (R):</span>
                <input type="range" id="lambda_slider" min="1" max="1000" value="5">
                <span class="readout-val"><span id="val_lambda">5</span></span>
            </div>
            <div class="slider-group">
                <span class="toggle-label">Inverse Lambda (V):</span>
                <input type="range" id="lambda_slider_doppler" min="1" max="1000" value="4">
                <span class="readout-val"><span id="val_lambda_doppler">4</span></span>
            </div>
            <div class="slider-group">
                <span class="toggle-label">Simulation Speed:</span>
                <input type="range" id="speed_slider" min="0" max="1" value="1" step="0.001">
                <span class="readout-val"><span id="val_speed">2</span></span>
            </div>
            <div class="slider-group">
                <span class="toggle-label">Noise level (SNR):</span>
                <input type="range" id="noise_slider" min="-10" max="30" value="20" step="1">
                <span class="readout-val"><span id="val_noise">2</span></span>
            </div>
        </div>

        <div class="target-management-block">
            <button id="addTargetBtn" class="btn-add">+ Add New Target</button>
            <div id="targetControlsContainer"></div>
        </div>
        
        <div id="radarChart" class="chart-box"></div>

        <div id="frequencyHistory" class="chart-box"></div>
        <div id="frequencyHistoryDoppler" class="chart-box"></div>

        <div id="rangeDopplerMap" class="chart-box"></div>
        
    </div>
</div>

    <script type="module" src="app.js"></script>
</body>
</html>
