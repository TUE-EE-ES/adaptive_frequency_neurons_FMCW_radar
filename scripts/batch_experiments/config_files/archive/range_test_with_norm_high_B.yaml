# ============================================================
# Radar system configuration (FMCW)
# ============================================================
radar_config:
  n_rx: 1                     # Number of receive antennas
  fb: 60e9  # Radar carrier frequency (Hz)
  B: 1.0e9         # Chirp bandwidth (Hz)

  n_chirps: 64        # Number of chirps per frame
  n_samples: 512      # ADC samples per chirp
  t_chirp: 25.6e-5     # Chirp duration (seconds)

  IQ: true               # Use complex IQ data
  noise_std: 1.0e-4           # Base noise standard deviation


# ============================================================
# Experiment setup
# ============================================================
experiment:
  number_of_trials: 50000      # Independent Monte-Carlo runs
  frames_per_trial: 1         # Radar frames processed per run
  output_file: single_target_range_test_with_norm_high_B.npy
  save_file: true
  show_plot: false


# ============================================================
# Target generation
# ============================================================
targets:
  max_number: 1               # Maximum simultaneous targets

  range_m:
    min: 0.1                  # Minimum target range (meters)
    max: 15               # Maximum target range (meters)


# ============================================================
# Beamforming
# ============================================================
beamforming:
  enabled: false              # Enable virtual beamforming


# ============================================================
# Noise randomization
# ============================================================
noise:
  randomize: false            # Randomize noise per trial
  std_range:
    min: 0.001
    max: 2.0


# ============================================================
# Adaptive Resonance Network
# ============================================================
network:
  random_start_frequency: true
  max_start_frequency: 6.0e5   # Upper bound for random init (Hz)
                                  # TODO: derive from radar parameters

  random_w_scale: false            # Inverse learning rate (λ⁻¹)
  w_scale: 12
                                  # w_scale is multiplied by chirp duration
  w_scale_range:
    min: 1.0e-4
    max: 15.0

  random_input_normalization: false
  input_normalization: false
  amplitude_normalization: true # normalization of the neurons mag. 