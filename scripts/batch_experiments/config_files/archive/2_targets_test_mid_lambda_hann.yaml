# ============================================================
# Radar system configuration (FMCW)
# ============================================================
radar_config:
  n_rx: 1                     # Number of receive antennas
  fb: 60e9  # Radar carrier frequency (Hz)
  B: 2.0e9         # Chirp bandwidth (Hz)

  n_chirps: 64        # Number of chirps per frame
  n_samples: 128      # ADC samples per chirp
  t_chirp: 6.4e-4     # Chirp duration (seconds)

  IQ: true               # Use complex IQ data
  noise_std: 0.0001           # Base noise standard deviation
  wdot_mode: false
  hann_window: true
  noise_snr: 100
  random_ap: false

# ============================================================
# Experiment setup
# ============================================================
experiment:
  number_of_trials: 5000      # Independent Monte-Carlo runs
  frames_per_trial: 5         # Radar frames processed per run
  output_file: two_targets_mid_lambda_hann.npy
  save_file: true
  show_plot: false


# ============================================================
# Target generation
# ============================================================
targets:
  max_number: 2               # Maximum simultaneous targets
  # note: it is not a random choice between 1 and max number
  # but the number of targets is always max_number
  range_m:
    min: 0.1                  # Minimum target range (meters)
    max: null                  # Maximum target range (meters)


# ============================================================
# Beamforming
# ============================================================
beamforming:
  enabled: false              # Enable virtual beamforming


# ============================================================
# Noise randomization
# ============================================================
noise:
  randomize: false            # Randomize noise per trial
  std_range:
    min: 0.001
    max: 0.5


# ============================================================
# Adaptive Resonance Network
# ============================================================
network:
  random_start_frequency: true

  random_w_scale: false            # Inverse learning rate (λ⁻¹)
                                  # w_scale is multiplied by chirp duration
  w_scale: 7
  w_scale_range:
    min: 1.0e-4
    max: 15.0

  random_input_normalization: false
  input_normalization: false
  amplitude_normalization: true 
